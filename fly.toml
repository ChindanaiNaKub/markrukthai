# Fly.io configuration for ThaiChess
# WARNING: Fly.io no longer has a free tier (as of 2024).
# This will cost ~$3-5/month. Use Render.com for free hosting instead.
# Deploy: fly launch --no-deploy && fly deploy

app = 'thaichess'
primary_region = 'sin' # Singapore - close to Thailand

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  DATA_DIR = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

# Persistent volume for SQLite database
[mounts]
  source = 'thaichess_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
